name: Bug report
description: Something in Maestro misbehaves
labels: ["bug"]
body:
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Exact commands and config to trigger the problem.
      placeholder: |
        1. maestro init
        2. maestro run "..."
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include error output or logs if available.
    validations:
      required: true
  - type: textarea
    id: doctor
    attributes:
      label: maestro doctor --json output
      description: Run `maestro doctor --json` in the affected project and paste the output.
      render: json
    validations:
      required: false
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: e.g. Fedora 44, macOS 15
    validations:
      required: true
  - type: input
    id: node-version
    attributes:
      label: Node.js version
      placeholder: output of `node --version`
    validations:
      required: true
  - type: input
    id: maestro-version
    attributes:
      label: Maestro version
      placeholder: output of `maestro --version` or the installed commit
    validations:
      required: true
