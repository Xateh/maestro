name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - name: Verify tag matches package.json version
        run: |
          pkg_version="$(node -p "require('./package.json').version")"
          if [ "$GITHUB_REF_NAME" != "v$pkg_version" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package.json version v$pkg_version" >&2
            exit 1
          fi
      - run: npm pack
      - name: Extract changelog section
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v ver="$version" '
            $0 ~ "^## \\[" ver "\\]" { found = 1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "_No CHANGELOG.md section found for ${version}._" > release-notes.md
          fi
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes-file release-notes.md \
            maestro-orchestrator-*.tgz
