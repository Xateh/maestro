name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: npm
      - run: npm ci
      - run: npm run lint

  test:
    name: Test (${{ matrix.os }}, Node ${{ matrix.node-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        node-version: [22.x, 24.x]
        include:
          - os: macos-latest
            node-version: 24.x
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm test

  test-terminal-backend:
    name: Test (terminal backend, default)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: npm
      - run: npm ci
      # Pin the zero-dependency terminal backend as a first-class tested lane:
      # the default when herdr is absent, exercised here without relying on the
      # auto-fallback path being incidentally hit.
      - run: npm run test:terminal

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: npm
      - run: npm ci
      - run: npm run test:coverage
      - uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage/
          retention-days: 14

  audit:
    name: Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: npm
      - run: npm ci
      - run: npm audit --omit=dev --audit-level=high

  no-private-files:
    name: No private files on public main
    # Backstop for the private->public split, and a REQUIRED status check via
    # branch protection on public main. Direct pushes to public main are blocked
    # by that protection (PR required, enforced for admins), so every change
    # arrives as a PR — gating on pull_request alone is sufficient. A release
    # branch must have run scripts/strip-private.sh first. Internal dev PRs in the
    # private repo (Xateh/maestro-dev) legitimately carry these artifacts and must
    # never be blocked, so this job is skipped there.
    if: >-
      github.repository == 'Xateh/maestro' &&
      github.event_name == 'pull_request' &&
      github.base_ref == 'main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Fail if any internal artifact is present
        run: |
          # Internal artifacts that must never reach public main. Keep this list
          # in sync with scripts/strip-private.sh and scripts/hooks/pre-push.
          #   *.private.md          internal agent instructions
          #   AGENT.md, CLAUDE.md   internal agent instructions (target + symlink)
          #   graphify-out/         internal knowledge-graph data
          #   docs/superpowers|specs|internal/  design scratch + internal docs
          #   .claude/              local harness config (settings.json hooks)
          #   scripts/{strip-private,graphify-sync,install-hooks}.sh, scripts/hooks/
          #                         the dev->public release tooling itself
          matches="$(git ls-files \
            '*.private.md' \
            'AGENT.md' \
            'CLAUDE.md' \
            'graphify-out/' \
            'docs/superpowers/' \
            'docs/specs/' \
            'docs/internal/' \
            '.claude/' \
            'scripts/strip-private.sh' \
            'scripts/graphify-sync.sh' \
            'scripts/install-hooks.sh' \
            'scripts/hooks/')"
          if [ -n "$matches" ]; then
            echo "Internal artifacts must be stripped before a PR reaches public main:" >&2
            echo "$matches" >&2
            echo "Run scripts/strip-private.sh on the release branch and commit." >&2
            exit 1
          fi
          echo "No internal artifacts present — ok."
